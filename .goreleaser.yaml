# yaml-language-server: $schema=https://goreleaser.com/static/schema-pro.json
version: 2
project_name: lantern-box
metadata:
  maintainers:
    - "Lantern Team <dev@getlantern.org>"
  description: Lantern Box
  homepage: "https://github.com/getlantern/lantern-box"
  license: "GPL"

builds:
  - id: amd64
    main: ./cmd
    flags:
      - -v
      - -trimpath
    goos:
      - linux
    goarch:
      - amd64
    env:
      - CGO_ENABLED=1
      - CC=gcc
      - CXX=g++
    ldflags:
      - -X github.com/sagernet/sing-box/constant.Version={{ .Version }} -s -w -buildid=
    tags:
      - with_gvisor
      - with_quic
      - with_dhcp
      - with_wireguard
      - with_utls
      - with_acme
      - with_clash_api
    binary: lantern-box

  - id: arm64
    main: ./cmd
    flags:
      - -v
      - -trimpath
    goos:
      - linux
    goarch:
      - arm64
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
    ldflags:
      - -X github.com/sagernet/sing-box/constant.Version={{ .Version }} -s -w -buildid=
    tags:
      - with_gvisor
      - with_quic
      - with_dhcp
      - with_wireguard
      - with_utls
      - with_acme
      - with_clash_api
    binary: lantern-box

archives:
  - formats: ["tar.gz"]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  replace_existing_artifacts: true

nfpms:
  - id: lantern-box
    package_name: "lantern-box"
    formats:
      - deb
      - rpm
    section: "default"
    maintainer: "Lantern Team <dev@getlantern.org>"
    description: |
      Lantern Box
    vendor: "Brave New Software"
    homepage: "https://github.com/getlantern/lantern-box"
    license: "GPL"
    contents:
      - src: cmd/release/lantern-box.service
        dst: /usr/lib/systemd/system/lantern-box.service
      - src: cmd/release/lantern-box@.service
        dst: /usr/lib/systemd/system/lantern-box@.service

  # Backward-compatible package for Gemfury consumers (e.g. private server feature).
  # Same binary and service files, just published under the old name.
  - id: gemfury-compat
    package_name: "sing-box-extensions"
    formats:
      - deb
      - rpm
    section: "default"
    maintainer: "Lantern Team <dev@getlantern.org>"
    description: |
      Lantern Box (legacy sing-box-extensions package name)
    vendor: "Brave New Software"
    homepage: "https://github.com/getlantern/lantern-box"
    license: "GPL"
    contents:
      - src: cmd/release/lantern-box.service
        dst: /usr/lib/systemd/system/sing-box-extensions.service
      - src: cmd/release/lantern-box@.service
        dst: /usr/lib/systemd/system/sing-box-extensions@.service

furies:
  - account: getlantern
    ids: [gemfury-compat]
    formats:
      - deb
      - rpm

dockers:
  - image_templates:
      - "getlantern/lantern-box:latest"
      - "getlantern/lantern-box:{{ .Tag }}"
    dockerfile: Dockerfile.goreleaser
    ids: [amd64]

dockerhub:
  - images:
      - getlantern/lantern-box
    username: getlantern
    secret_name: DOCKER_PASSWORD
    full_description:
      from_file:
        path: ./README.md