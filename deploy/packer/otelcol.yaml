# OTel Collector config for VPS proxy instances.
# Collects host metrics (CPU, memory, disk, network) and ships to SigNoz.
# The SIGNOZ_INGEST_KEY and INSTANCE_LABELS env vars are set by cloud-init.

receivers:
  # Host-level metrics: CPU, memory, disk, network, load, filesystem
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu:
      memory:
      disk:
      network:
      load:
      filesystem:
        exclude_mount_points:
          mount_points: ["/proc", "/sys", "/dev", "/run"]
          match_type: strict
      process:
        include:
          match_type: regexp
          names: ["lantern-box", "sing-box"]

processors:
  batch:
    send_batch_size: 1024
    timeout: 10s

  # Tag every metric with route_id, instance_id, provider, region
  # These are injected via OTEL_RESOURCE_ATTRIBUTES at service start
  resourcedetection:
    detectors: [env]
    timeout: 2s

  memory_limiter:
    check_interval: 5s
    limit_mib: 50

exporters:
  otlp/signoz:
    endpoint: "ingest.us.signoz.cloud:443"
    tls:
      insecure: false
    headers:
      "signoz-access-token": "${env:SIGNOZ_INGEST_KEY}"
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 60s

service:
  pipelines:
    metrics:
      receivers: [hostmetrics]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [otlp/signoz]
