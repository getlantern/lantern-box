# OTel Collector config for VPS proxy instances.
# Collects host metrics (CPU, memory, disk, network) and structured logs
# (auto-update script, etc.) and ships to the internal ops pipeline
# (ops.lantr.net, reachable via Headscale VPN relay with --accept-routes).
# The OTEL_RESOURCE_ATTRIBUTES env var is set by cloud-init.

receivers:
  # Host-level metrics: CPU, memory, disk, network, load, filesystem
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu:
      memory:
      disk:
      network:
      load:
      filesystem:
        exclude_mount_points:
          mount_points: ["/proc", "/sys", "/dev", "/run"]
          match_type: strict
      process:
        include:
          match_type: regexp
          names: ["lantern-box", "sing-box"]

  # Structured JSON logs from the auto-update script and other lantern-box tooling.
  filelog/lantern-box:
    include: ["/var/log/lantern-box/*.log"]
    start_at: end
    max_log_size: 65536
    operators:
      - type: json_parser
        parse_from: body
        timestamp:
          parse_from: attributes.timestamp
          layout: "%Y-%m-%dT%H:%M:%SZ"
        severity:
          parse_from: attributes.severity
      # Move the JSON "body" field into the log record body so it's
      # searchable as the main log message in SigNoz.
      - type: move
        from: attributes.body
        to: body

  # Cloud-init journald logs (the `logger -t cloud-init …` step + ERR-trap
  # output from lantern-cloud's cloudinit_packer.go). Without this receiver
  # those messages stay on-host in /var/log/cloud-init-output.log and
  # journald only — invisible to SigNoz. That gap is exactly why the
  # May 8 dpkg-flag regression needed an SSH session to diagnose; with
  # this in place, a future cloud-init halt surfaces directly in the
  # logs pipeline tagged with the same OTEL_RESOURCE_ATTRIBUTES we set
  # on metrics (route.id, deployment.environment, cloud.provider, etc.),
  # so operators can grep for it without leaving SigNoz.
  #
  # Filtered to `cloud-init` to avoid shipping every systemd unit's
  # output (sshd, unattended-upgrades, etc.). The receiver runs as the
  # otelcol-contrib user, which needs `systemd-journal` group access
  # (granted via systemd drop-in in deploy/packer/provision.sh).
  journald:
    units: [cloud-init.service, cloud-final.service]
    # Match anything tagged via `logger -t cloud-init …` even when emitted
    # outside the cloud-init systemd unit (e.g. the ERR trap firing late).
    matches:
      - SYSLOG_IDENTIFIER: cloud-init

processors:
  batch:
    send_batch_size: 1024
    timeout: 10s

  # Tag every metric with route_id, instance_id, provider, region
  # These are injected via OTEL_RESOURCE_ATTRIBUTES at service start
  resourcedetection:
    detectors: [env]
    timeout: 2s

  memory_limiter:
    check_interval: 5s
    limit_mib: 50

exporters:
  otlphttp:
    endpoint: "https://ops.lantr.net:443"
    tls:
      insecure: false
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 60s

service:
  pipelines:
    metrics:
      receivers: [hostmetrics]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [otlphttp]
    logs:
      receivers: [filelog/lantern-box, journald]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [otlphttp]
