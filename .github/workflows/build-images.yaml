name: Build Packer Images

on:
  # Run after a release is published (GoReleaser pushes .deb to Gemfury first)
  release:
    types: [published]

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      version:
        description: "lantern-box version to bake into the image (e.g. 1.2.3)"
        required: true
        type: string
      builders:
        description: "Comma-separated builders (digitalocean,linode,oracle-oci)"
        required: false
        default: "digitalocean,linode,oracle-oci"
        type: string

permissions:
  contents: read

jobs:
  build-images:
    name: Build images
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            # Strip the leading 'v' from the tag
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "builders=digitalocean.lantern-box,linode.lantern-box,oracle-oci.lantern-box" >> "$GITHUB_OUTPUT"
          else
            version="${{ inputs.version }}"
            if [[ "$version" == v* ]]; then
              echo "::error::Version should not start with 'v' (got '$version'). Use e.g. 1.2.3"
              exit 1
            fi
            echo "version=$version" >> "$GITHUB_OUTPUT"
            # Convert comma-separated builder names to packer format
            builders=""
            IFS=',' read -ra PARTS <<< "${{ inputs.builders }}"
            for part in "${PARTS[@]}"; do
              part=$(echo "$part" | xargs)  # trim whitespace
              builders="${builders:+$builders,}${part}.lantern-box"
            done
            echo "builders=$builders" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Packer
        uses: hashicorp/setup-packer@v3
        with:
          version: 1.11.2

      - name: Init Packer plugins
        working-directory: deploy/packer
        run: packer init lantern-box.pkr.hcl

      - name: Write OCI private key
        run: |
          echo "${{ secrets.OCI_KEY_CONTENT }}" > /tmp/oci_api_key.pem
          chmod 600 /tmp/oci_api_key.pem

      - name: Build images
        working-directory: deploy/packer
        env:
          DIGITALOCEAN_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_KEY_FILE: /tmp/oci_api_key.pem
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          OCI_SUBNET_OCID: ${{ secrets.OCI_SUBNET_OCID }}
          OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
        run: |
          packer build \
            -var "lantern_box_version=${{ steps.version.outputs.version }}" \
            -only="${{ steps.version.outputs.builders }}" \
            lantern-box.pkr.hcl

      - name: Update Vault with new image IDs
        if: success()
        working-directory: deploy/packer
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
          VAULT_CACERT: ${{ secrets.VAULT_CACERT }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "$VAULT_ADDR" ] || [ -z "$VAULT_TOKEN" ]; then
            echo "::error::VAULT_ADDR or VAULT_TOKEN not set — cannot update image IDs in Vault"
            exit 1
          fi
          if [ ! -f manifest.json ]; then
            echo "::warning::manifest.json not found, skipping Vault update"
            exit 0
          fi

          # Write CA cert if provided, otherwise skip TLS verification
          if [ -n "$VAULT_CACERT" ]; then
            echo "$VAULT_CACERT" > /tmp/vault-ca.pem
            export VAULT_CACERT=/tmp/vault-ca.pem
          else
            echo "::warning::VAULT_CACERT not set, disabling TLS verification"
            export VAULT_SKIP_VERIFY=1
          fi

          # Install vault CLI with checksum verification
          curl -fsSL https://releases.hashicorp.com/vault/1.17.2/vault_1.17.2_linux_amd64.zip -o /tmp/vault.zip
          curl -fsSL https://releases.hashicorp.com/vault/1.17.2/vault_1.17.2_SHA256SUMS -o /tmp/vault_SHA256SUMS
          (cd /tmp && grep 'vault_1.17.2_linux_amd64.zip' vault_SHA256SUMS | sha256sum -c -)
          unzip -o /tmp/vault.zip -d /tmp
          chmod +x /tmp/vault

          # Parse image IDs from packer manifest
          oci_image=$(jq -r '.builds[] | select(.builder_type == "oracle-oci") | .artifact_id // empty' manifest.json)
          linode_image=$(jq -r '.builds[] | select(.builder_type == "linode") | .artifact_id // empty' manifest.json)
          do_image=$(jq -r '.builds[] | select(.builder_type == "digitalocean") | .artifact_id // empty' manifest.json)

          echo "Packer images:"
          echo "  OCI:          ${oci_image:-<not built>}"
          echo "  Linode:       ${linode_image:-<not built>}"
          echo "  DigitalOcean: ${do_image:-<not built>}"

          # Build the packer_images Vault secret with all provider image IDs
          images_json=$(jq -n \
            --arg ver "$VERSION" \
            --arg oci "$oci_image" \
            --arg linode "$linode_image" \
            --arg do "$do_image" \
            '{version: $ver, oci: $oci, linode: $linode, digitalocean: $do}')

          echo "Updating Vault secret/lantern_cloud/vps/packer_images..."
          echo "$images_json" | /tmp/vault kv put secret/lantern_cloud/vps/packer_images -
          echo "Done."

          # Also update the OCI region config (image_id) used by the provision worker today
          if [ -n "$oci_image" ]; then
            current=$(/tmp/vault kv get -format=json secret/lantern_cloud/vps/oci_regions 2>/dev/null | jq '.data.data' || echo '{}')
            regions_type=$(echo "$current" | jq -r 'if has("regions") then (.regions | type) else "null" end' 2>/dev/null || echo "null")
            if [ "$regions_type" != "object" ]; then
              echo "::warning::Vault secret/lantern_cloud/vps/oci_regions has no valid .regions object; skipping OCI regions image_id update"
            else
              updated=$(echo "$current" | jq --arg img "$oci_image" '
                .regions |= with_entries(.value.image_id = $img)
              ')
              echo "Updating Vault secret/lantern_cloud/vps/oci_regions..."
              echo "$updated" | /tmp/vault kv put secret/lantern_cloud/vps/oci_regions -
              echo "Done."
            fi
          fi

      - name: Clean up OCI key
        if: always()
        run: rm -f /tmp/oci_api_key.pem

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: packer-manifest
          path: deploy/packer/manifest.json
