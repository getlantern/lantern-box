name: Build Packer Images

on:
  # Packer image contents changed — rebuild. Under Reflog's Option B the
  # lantern-box binary no longer lives in the image, so a plain Go release
  # doesn't require an image rebuild. This trigger fires only when
  # something in the image itself actually changed (provision.sh,
  # cloud-init scripts, packer HCL, otel config, the workflow itself).
  push:
    branches: [main]
    paths:
      - 'deploy/packer/**'
      - '.github/workflows/build-images.yaml'

  # Allow manual trigger for ad-hoc rebuilds (base-image updates, etc.)
  workflow_dispatch:
    inputs:
      version:
        description: "Label to apply to the built image (e.g. 1.2.3 — used only for image naming; the lantern-box binary comes from cloud-init at boot time)"
        required: false
        type: string
      builders:
        description: "Comma-separated builders (linode,oracle-oci,alicloud-ecs)"
        required: false
        default: "linode,oracle-oci,alicloud-ecs"
        type: string

permissions:
  contents: read

jobs:
  # Determine version and which builders to run
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout (full history — needed to find the latest tag)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          case "$EVENT_NAME" in
            workflow_dispatch)
              if [ -z "$INPUT_VERSION" ]; then
                # Operator didn't specify — fall through to "latest tag" path.
                :
              elif [[ "$INPUT_VERSION" == v* ]]; then
                echo "::error::Version should not start with 'v' (got '$INPUT_VERSION'). Use e.g. 1.2.3"
                exit 1
              else
                echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              ;;
          esac
          # push or workflow_dispatch without version: label the image with
          # the latest tag on main. The image itself is version-agnostic
          # under Option B — this is purely for image-name bookkeeping and
          # the per-provider latestImage() helpers that filter on prefix.
          latest=$(git tag -l 'v*' --sort=-v:refname | head -1)
          latest="${latest:-v0.0.0}"
          echo "version=${latest#v}" >> "$GITHUB_OUTPUT"

      - name: Build matrix
        id: matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_BUILDERS: ${{ inputs.builders }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            builders="linode,oracle-oci,alicloud-ecs"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_BUILDERS" ]; then
            builders="$INPUT_BUILDERS"
          else
            builders="linode,oracle-oci,alicloud-ecs"
          fi
          # Validate that we have at least one builder
          if [ -z "$builders" ]; then
            echo "::error::No builders specified. Provide at least one builder (comma-separated) via the 'builders' input."
            exit 1
          fi

          # Convert to JSON array for matrix strategy using jq to safely escape values
          # -c produces compact single-line output required by $GITHUB_OUTPUT
          json_array=$(printf '%s\n' "$builders" | tr ',' '\n' | jq -R . | jq -sc .)
          echo "matrix={\"builder\":$json_array}" >> "$GITHUB_OUTPUT"
          echo "Matrix: $json_array"

  # Prune old images before building (avoids provider quota limits)
  prune:
    name: Prune old images
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: prepare
    steps:
      - name: Prune old Linode images
        if: contains(needs.prepare.outputs.matrix, 'linode')
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          KEEP=3
          echo "Fetching Linode custom images..."
          images=$(curl -sS -f -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/images?page_size=500" \
            | jq -r '.data[] | select(.is_public == false and (.label | startswith("lantern-box-"))) | "\(.created)\t\(.id)\t\(.label)"' \
            | sort -r)
          total=$(echo "$images" | grep -c . || true)
          echo "Found $total lantern-box images (keeping $KEEP most recent)"
          if [ "$total" -le "$KEEP" ]; then
            echo "Nothing to prune."
          else
            failures=0
            echo "$images" | tail -n +$((KEEP + 1)) | while IFS=$'\t' read -r created id label; do
              echo "Deleting $label ($id, created $created)..."
              http_code=$(curl -sS -o /dev/null -w '%{http_code}' -X DELETE -H "Authorization: Bearer $LINODE_TOKEN" \
                "https://api.linode.com/v4/images/$id")
              if [ "$http_code" = "404" ]; then
                echo "  Already gone (404), skipping."
              elif [ "$http_code" -ge 400 ]; then
                echo "::error::Failed to delete Linode image $label ($id): HTTP $http_code"
                failures=$((failures + 1))
              fi
            done
            if [ "$failures" -gt 0 ]; then
              echo "::error::$failures image(s) failed to delete"
              exit 1
            fi
          fi

  build-datacap:
    name: Build datacap binaries
    runs-on: ubuntu-latest
    needs: prepare
    timeout-minutes: 15
    steps:
      - name: Checkout lantern-cloud
        uses: actions/checkout@v6
        with:
          repository: getlantern/lantern-cloud
          path: lantern-cloud
          token: ${{ secrets.CI_PRIVATE_REPOS_GH_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: lantern-cloud/go.mod

      - name: Install cross-compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y -q gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build datacap binaries
        working-directory: lantern-cloud
        run: |
          CGO_ENABLED=1 go build -o /tmp/datacap-amd64 github.com/getlantern/lantern-cloud/cmd/datacap
          GOARCH=arm64 CC=aarch64-linux-gnu-gcc CXX=aarch64-linux-gnu-g++ CGO_ENABLED=1 go build -o /tmp/datacap-arm64 github.com/getlantern/lantern-cloud/cmd/datacap

      - name: Upload datacap binaries
        uses: actions/upload-artifact@v5
        with:
          name: datacap-binaries
          path: |
            /tmp/datacap-amd64
            /tmp/datacap-arm64

  # Build each provider in parallel
  build:
    name: Build ${{ matrix.builder }}
    runs-on: ubuntu-latest
    needs: [prepare, prune, build-datacap]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    # Alicloud copies images to 8 regions (up to 2h). OCI builds 36 regions
    # in parallel — usually ~7min but a slow mirror can push past 45min.
    timeout-minutes: ${{ matrix.builder == 'alicloud-ecs' && 150 || 60 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download datacap binaries
        uses: actions/download-artifact@v5
        with:
          name: datacap-binaries
          path: /tmp

      - name: Setup Packer
        uses: hashicorp/setup-packer@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          version: 1.11.2

      - name: Init Packer plugins
        working-directory: deploy/packer
        run: packer init .

      - name: Map builder to packer -only flag
        id: only
        env:
          BUILDER: ${{ matrix.builder }}
        run: |
          case "$BUILDER" in
            oracle-oci)
              oci_regions=(iad fra nrt sin phx ams bom gru ord sjc yyz yul mty qro mrs lin mad arn zrh cdg lhr cwl icn kix mel syd ynj xsp dxb jed ruh jrs jnb scl bog vap)
              prefix="oracle-oci.lantern-box-"
              joined=""
              for r in "${oci_regions[@]}"; do
                [ -n "$joined" ] && joined+=","
                joined+="${prefix}${r}"
              done
              echo "flag=$joined" >> "$GITHUB_OUTPUT"
              ;;
            linode|alicloud-ecs)
              echo "flag=${BUILDER}.lantern-box" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unsupported builder: $BUILDER"
              exit 1
              ;;
          esac

      - name: Write OCI private key
        if: matrix.builder == 'oracle-oci'
        run: |
          echo "${{ secrets.OCI_KEY_CONTENT }}" > /tmp/oci_api_key.pem
          chmod 600 /tmp/oci_api_key.pem

      - name: Verify OCI region secrets
        if: matrix.builder == 'oracle-oci'
        env:
          OCI_SUBNET_OCID_IAD: ${{ secrets.OCI_SUBNET_OCID_IAD || secrets.OCI_SUBNET_OCID }}
          OCI_AVAILABILITY_DOMAIN_IAD: ${{ secrets.OCI_AVAILABILITY_DOMAIN_IAD || secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_SUBNET_OCID_FRA: ${{ secrets.OCI_SUBNET_OCID_FRA }}
          OCI_AVAILABILITY_DOMAIN_FRA: ${{ secrets.OCI_AVAILABILITY_DOMAIN_FRA }}
          OCI_SUBNET_OCID_NRT: ${{ secrets.OCI_SUBNET_OCID_NRT }}
          OCI_AVAILABILITY_DOMAIN_NRT: ${{ secrets.OCI_AVAILABILITY_DOMAIN_NRT }}
          OCI_SUBNET_OCID_SIN: ${{ secrets.OCI_SUBNET_OCID_SIN }}
          OCI_AVAILABILITY_DOMAIN_SIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN_SIN }}
          OCI_SUBNET_OCID_PHX: ${{ secrets.OCI_SUBNET_OCID_PHX }}
          OCI_AVAILABILITY_DOMAIN_PHX: ${{ secrets.OCI_AVAILABILITY_DOMAIN_PHX }}
          OCI_SUBNET_OCID_AMS: ${{ secrets.OCI_SUBNET_OCID_AMS }}
          OCI_AVAILABILITY_DOMAIN_AMS: ${{ secrets.OCI_AVAILABILITY_DOMAIN_AMS }}
          OCI_SUBNET_OCID_BOM: ${{ secrets.OCI_SUBNET_OCID_BOM }}
          OCI_AVAILABILITY_DOMAIN_BOM: ${{ secrets.OCI_AVAILABILITY_DOMAIN_BOM }}
          OCI_SUBNET_OCID_GRU: ${{ secrets.OCI_SUBNET_OCID_GRU }}
          OCI_AVAILABILITY_DOMAIN_GRU: ${{ secrets.OCI_AVAILABILITY_DOMAIN_GRU }}
          OCI_SUBNET_OCID_ORD: ${{ secrets.OCI_SUBNET_OCID_ORD }}
          OCI_AVAILABILITY_DOMAIN_ORD: ${{ secrets.OCI_AVAILABILITY_DOMAIN_ORD }}
          OCI_SUBNET_OCID_SJC: ${{ secrets.OCI_SUBNET_OCID_SJC }}
          OCI_AVAILABILITY_DOMAIN_SJC: ${{ secrets.OCI_AVAILABILITY_DOMAIN_SJC }}
          OCI_SUBNET_OCID_YYZ: ${{ secrets.OCI_SUBNET_OCID_YYZ }}
          OCI_AVAILABILITY_DOMAIN_YYZ: ${{ secrets.OCI_AVAILABILITY_DOMAIN_YYZ }}
          OCI_SUBNET_OCID_YUL: ${{ secrets.OCI_SUBNET_OCID_YUL }}
          OCI_AVAILABILITY_DOMAIN_YUL: ${{ secrets.OCI_AVAILABILITY_DOMAIN_YUL }}
          OCI_SUBNET_OCID_MTY: ${{ secrets.OCI_SUBNET_OCID_MTY }}
          OCI_AVAILABILITY_DOMAIN_MTY: ${{ secrets.OCI_AVAILABILITY_DOMAIN_MTY }}
          OCI_SUBNET_OCID_QRO: ${{ secrets.OCI_SUBNET_OCID_QRO }}
          OCI_AVAILABILITY_DOMAIN_QRO: ${{ secrets.OCI_AVAILABILITY_DOMAIN_QRO }}
          OCI_SUBNET_OCID_MRS: ${{ secrets.OCI_SUBNET_OCID_MRS }}
          OCI_AVAILABILITY_DOMAIN_MRS: ${{ secrets.OCI_AVAILABILITY_DOMAIN_MRS }}
          OCI_SUBNET_OCID_LIN: ${{ secrets.OCI_SUBNET_OCID_LIN }}
          OCI_AVAILABILITY_DOMAIN_LIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN_LIN }}
          OCI_SUBNET_OCID_MAD: ${{ secrets.OCI_SUBNET_OCID_MAD }}
          OCI_AVAILABILITY_DOMAIN_MAD: ${{ secrets.OCI_AVAILABILITY_DOMAIN_MAD }}
          OCI_SUBNET_OCID_ARN: ${{ secrets.OCI_SUBNET_OCID_ARN }}
          OCI_AVAILABILITY_DOMAIN_ARN: ${{ secrets.OCI_AVAILABILITY_DOMAIN_ARN }}
          OCI_SUBNET_OCID_ZRH: ${{ secrets.OCI_SUBNET_OCID_ZRH }}
          OCI_AVAILABILITY_DOMAIN_ZRH: ${{ secrets.OCI_AVAILABILITY_DOMAIN_ZRH }}
          OCI_SUBNET_OCID_CDG: ${{ secrets.OCI_SUBNET_OCID_CDG }}
          OCI_AVAILABILITY_DOMAIN_CDG: ${{ secrets.OCI_AVAILABILITY_DOMAIN_CDG }}
          OCI_SUBNET_OCID_LHR: ${{ secrets.OCI_SUBNET_OCID_LHR }}
          OCI_AVAILABILITY_DOMAIN_LHR: ${{ secrets.OCI_AVAILABILITY_DOMAIN_LHR }}
          OCI_SUBNET_OCID_CWL: ${{ secrets.OCI_SUBNET_OCID_CWL }}
          OCI_AVAILABILITY_DOMAIN_CWL: ${{ secrets.OCI_AVAILABILITY_DOMAIN_CWL }}
          OCI_SUBNET_OCID_ICN: ${{ secrets.OCI_SUBNET_OCID_ICN }}
          OCI_AVAILABILITY_DOMAIN_ICN: ${{ secrets.OCI_AVAILABILITY_DOMAIN_ICN }}
          OCI_SUBNET_OCID_KIX: ${{ secrets.OCI_SUBNET_OCID_KIX }}
          OCI_AVAILABILITY_DOMAIN_KIX: ${{ secrets.OCI_AVAILABILITY_DOMAIN_KIX }}
          OCI_SUBNET_OCID_MEL: ${{ secrets.OCI_SUBNET_OCID_MEL }}
          OCI_AVAILABILITY_DOMAIN_MEL: ${{ secrets.OCI_AVAILABILITY_DOMAIN_MEL }}
          OCI_SUBNET_OCID_SYD: ${{ secrets.OCI_SUBNET_OCID_SYD }}
          OCI_AVAILABILITY_DOMAIN_SYD: ${{ secrets.OCI_AVAILABILITY_DOMAIN_SYD }}
          OCI_SUBNET_OCID_YNJ: ${{ secrets.OCI_SUBNET_OCID_YNJ }}
          OCI_AVAILABILITY_DOMAIN_YNJ: ${{ secrets.OCI_AVAILABILITY_DOMAIN_YNJ }}
          OCI_SUBNET_OCID_XSP: ${{ secrets.OCI_SUBNET_OCID_XSP }}
          OCI_AVAILABILITY_DOMAIN_XSP: ${{ secrets.OCI_AVAILABILITY_DOMAIN_XSP }}
          OCI_SUBNET_OCID_DXB: ${{ secrets.OCI_SUBNET_OCID_DXB }}
          OCI_AVAILABILITY_DOMAIN_DXB: ${{ secrets.OCI_AVAILABILITY_DOMAIN_DXB }}
          OCI_SUBNET_OCID_JED: ${{ secrets.OCI_SUBNET_OCID_JED }}
          OCI_AVAILABILITY_DOMAIN_JED: ${{ secrets.OCI_AVAILABILITY_DOMAIN_JED }}
          OCI_SUBNET_OCID_RUH: ${{ secrets.OCI_SUBNET_OCID_RUH }}
          OCI_AVAILABILITY_DOMAIN_RUH: ${{ secrets.OCI_AVAILABILITY_DOMAIN_RUH }}
          OCI_SUBNET_OCID_JRS: ${{ secrets.OCI_SUBNET_OCID_JRS }}
          OCI_AVAILABILITY_DOMAIN_JRS: ${{ secrets.OCI_AVAILABILITY_DOMAIN_JRS }}
          OCI_SUBNET_OCID_JNB: ${{ secrets.OCI_SUBNET_OCID_JNB }}
          OCI_AVAILABILITY_DOMAIN_JNB: ${{ secrets.OCI_AVAILABILITY_DOMAIN_JNB }}
          OCI_SUBNET_OCID_SCL: ${{ secrets.OCI_SUBNET_OCID_SCL }}
          OCI_AVAILABILITY_DOMAIN_SCL: ${{ secrets.OCI_AVAILABILITY_DOMAIN_SCL }}
          OCI_SUBNET_OCID_BOG: ${{ secrets.OCI_SUBNET_OCID_BOG }}
          OCI_AVAILABILITY_DOMAIN_BOG: ${{ secrets.OCI_AVAILABILITY_DOMAIN_BOG }}
          OCI_SUBNET_OCID_VAP: ${{ secrets.OCI_SUBNET_OCID_VAP }}
          OCI_AVAILABILITY_DOMAIN_VAP: ${{ secrets.OCI_AVAILABILITY_DOMAIN_VAP }}
        run: |
          missing=""
          for region in IAD FRA NRT SIN PHX AMS BOM GRU ORD SJC YYZ YUL MTY QRO MRS LIN MAD ARN ZRH CDG LHR CWL ICN KIX MEL SYD YNJ XSP DXB JED RUH JRS JNB SCL BOG VAP; do
            subnet_var="OCI_SUBNET_OCID_${region}"
            ad_var="OCI_AVAILABILITY_DOMAIN_${region}"
            [ -z "${!subnet_var}" ] && missing="$missing $subnet_var"
            [ -z "${!ad_var}" ] && missing="$missing $ad_var"
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing OCI region secrets:$missing"
            exit 1
          fi
          echo "All OCI region secrets present"

      - name: Build
        working-directory: deploy/packer
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          ONLY: ${{ steps.only.outputs.flag }}
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_KEY_FILE: /tmp/oci_api_key.pem
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          OCI_SUBNET_OCID_IAD: ${{ secrets.OCI_SUBNET_OCID_IAD || secrets.OCI_SUBNET_OCID }}
          OCI_AVAILABILITY_DOMAIN_IAD: ${{ secrets.OCI_AVAILABILITY_DOMAIN_IAD || secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_SUBNET_OCID_FRA: ${{ secrets.OCI_SUBNET_OCID_FRA }}
          OCI_AVAILABILITY_DOMAIN_FRA: ${{ secrets.OCI_AVAILABILITY_DOMAIN_FRA }}
          OCI_SUBNET_OCID_NRT: ${{ secrets.OCI_SUBNET_OCID_NRT }}
          OCI_AVAILABILITY_DOMAIN_NRT: ${{ secrets.OCI_AVAILABILITY_DOMAIN_NRT }}
          OCI_SUBNET_OCID_SIN: ${{ secrets.OCI_SUBNET_OCID_SIN }}
          OCI_AVAILABILITY_DOMAIN_SIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN_SIN }}
          OCI_SUBNET_OCID_PHX: ${{ secrets.OCI_SUBNET_OCID_PHX }}
          OCI_AVAILABILITY_DOMAIN_PHX: ${{ secrets.OCI_AVAILABILITY_DOMAIN_PHX }}
          OCI_SUBNET_OCID_AMS: ${{ secrets.OCI_SUBNET_OCID_AMS }}
          OCI_AVAILABILITY_DOMAIN_AMS: ${{ secrets.OCI_AVAILABILITY_DOMAIN_AMS }}
          OCI_SUBNET_OCID_BOM: ${{ secrets.OCI_SUBNET_OCID_BOM }}
          OCI_AVAILABILITY_DOMAIN_BOM: ${{ secrets.OCI_AVAILABILITY_DOMAIN_BOM }}
          OCI_SUBNET_OCID_GRU: ${{ secrets.OCI_SUBNET_OCID_GRU }}
          OCI_AVAILABILITY_DOMAIN_GRU: ${{ secrets.OCI_AVAILABILITY_DOMAIN_GRU }}
          OCI_SUBNET_OCID_ORD: ${{ secrets.OCI_SUBNET_OCID_ORD }}
          OCI_AVAILABILITY_DOMAIN_ORD: ${{ secrets.OCI_AVAILABILITY_DOMAIN_ORD }}
          OCI_SUBNET_OCID_SJC: ${{ secrets.OCI_SUBNET_OCID_SJC }}
          OCI_AVAILABILITY_DOMAIN_SJC: ${{ secrets.OCI_AVAILABILITY_DOMAIN_SJC }}
          OCI_SUBNET_OCID_YYZ: ${{ secrets.OCI_SUBNET_OCID_YYZ }}
          OCI_AVAILABILITY_DOMAIN_YYZ: ${{ secrets.OCI_AVAILABILITY_DOMAIN_YYZ }}
          OCI_SUBNET_OCID_YUL: ${{ secrets.OCI_SUBNET_OCID_YUL }}
          OCI_AVAILABILITY_DOMAIN_YUL: ${{ secrets.OCI_AVAILABILITY_DOMAIN_YUL }}
          OCI_SUBNET_OCID_MTY: ${{ secrets.OCI_SUBNET_OCID_MTY }}
          OCI_AVAILABILITY_DOMAIN_MTY: ${{ secrets.OCI_AVAILABILITY_DOMAIN_MTY }}
          OCI_SUBNET_OCID_QRO: ${{ secrets.OCI_SUBNET_OCID_QRO }}
          OCI_AVAILABILITY_DOMAIN_QRO: ${{ secrets.OCI_AVAILABILITY_DOMAIN_QRO }}
          OCI_SUBNET_OCID_MRS: ${{ secrets.OCI_SUBNET_OCID_MRS }}
          OCI_AVAILABILITY_DOMAIN_MRS: ${{ secrets.OCI_AVAILABILITY_DOMAIN_MRS }}
          OCI_SUBNET_OCID_LIN: ${{ secrets.OCI_SUBNET_OCID_LIN }}
          OCI_AVAILABILITY_DOMAIN_LIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN_LIN }}
          OCI_SUBNET_OCID_MAD: ${{ secrets.OCI_SUBNET_OCID_MAD }}
          OCI_AVAILABILITY_DOMAIN_MAD: ${{ secrets.OCI_AVAILABILITY_DOMAIN_MAD }}
          OCI_SUBNET_OCID_ARN: ${{ secrets.OCI_SUBNET_OCID_ARN }}
          OCI_AVAILABILITY_DOMAIN_ARN: ${{ secrets.OCI_AVAILABILITY_DOMAIN_ARN }}
          OCI_SUBNET_OCID_ZRH: ${{ secrets.OCI_SUBNET_OCID_ZRH }}
          OCI_AVAILABILITY_DOMAIN_ZRH: ${{ secrets.OCI_AVAILABILITY_DOMAIN_ZRH }}
          OCI_SUBNET_OCID_CDG: ${{ secrets.OCI_SUBNET_OCID_CDG }}
          OCI_AVAILABILITY_DOMAIN_CDG: ${{ secrets.OCI_AVAILABILITY_DOMAIN_CDG }}
          OCI_SUBNET_OCID_LHR: ${{ secrets.OCI_SUBNET_OCID_LHR }}
          OCI_AVAILABILITY_DOMAIN_LHR: ${{ secrets.OCI_AVAILABILITY_DOMAIN_LHR }}
          OCI_SUBNET_OCID_CWL: ${{ secrets.OCI_SUBNET_OCID_CWL }}
          OCI_AVAILABILITY_DOMAIN_CWL: ${{ secrets.OCI_AVAILABILITY_DOMAIN_CWL }}
          OCI_SUBNET_OCID_ICN: ${{ secrets.OCI_SUBNET_OCID_ICN }}
          OCI_AVAILABILITY_DOMAIN_ICN: ${{ secrets.OCI_AVAILABILITY_DOMAIN_ICN }}
          OCI_SUBNET_OCID_KIX: ${{ secrets.OCI_SUBNET_OCID_KIX }}
          OCI_AVAILABILITY_DOMAIN_KIX: ${{ secrets.OCI_AVAILABILITY_DOMAIN_KIX }}
          OCI_SUBNET_OCID_MEL: ${{ secrets.OCI_SUBNET_OCID_MEL }}
          OCI_AVAILABILITY_DOMAIN_MEL: ${{ secrets.OCI_AVAILABILITY_DOMAIN_MEL }}
          OCI_SUBNET_OCID_SYD: ${{ secrets.OCI_SUBNET_OCID_SYD }}
          OCI_AVAILABILITY_DOMAIN_SYD: ${{ secrets.OCI_AVAILABILITY_DOMAIN_SYD }}
          OCI_SUBNET_OCID_YNJ: ${{ secrets.OCI_SUBNET_OCID_YNJ }}
          OCI_AVAILABILITY_DOMAIN_YNJ: ${{ secrets.OCI_AVAILABILITY_DOMAIN_YNJ }}
          OCI_SUBNET_OCID_XSP: ${{ secrets.OCI_SUBNET_OCID_XSP }}
          OCI_AVAILABILITY_DOMAIN_XSP: ${{ secrets.OCI_AVAILABILITY_DOMAIN_XSP }}
          OCI_SUBNET_OCID_DXB: ${{ secrets.OCI_SUBNET_OCID_DXB }}
          OCI_AVAILABILITY_DOMAIN_DXB: ${{ secrets.OCI_AVAILABILITY_DOMAIN_DXB }}
          OCI_SUBNET_OCID_JED: ${{ secrets.OCI_SUBNET_OCID_JED }}
          OCI_AVAILABILITY_DOMAIN_JED: ${{ secrets.OCI_AVAILABILITY_DOMAIN_JED }}
          OCI_SUBNET_OCID_RUH: ${{ secrets.OCI_SUBNET_OCID_RUH }}
          OCI_AVAILABILITY_DOMAIN_RUH: ${{ secrets.OCI_AVAILABILITY_DOMAIN_RUH }}
          OCI_SUBNET_OCID_JRS: ${{ secrets.OCI_SUBNET_OCID_JRS }}
          OCI_AVAILABILITY_DOMAIN_JRS: ${{ secrets.OCI_AVAILABILITY_DOMAIN_JRS }}
          OCI_SUBNET_OCID_JNB: ${{ secrets.OCI_SUBNET_OCID_JNB }}
          OCI_AVAILABILITY_DOMAIN_JNB: ${{ secrets.OCI_AVAILABILITY_DOMAIN_JNB }}
          OCI_SUBNET_OCID_SCL: ${{ secrets.OCI_SUBNET_OCID_SCL }}
          OCI_AVAILABILITY_DOMAIN_SCL: ${{ secrets.OCI_AVAILABILITY_DOMAIN_SCL }}
          OCI_SUBNET_OCID_BOG: ${{ secrets.OCI_SUBNET_OCID_BOG }}
          OCI_AVAILABILITY_DOMAIN_BOG: ${{ secrets.OCI_AVAILABILITY_DOMAIN_BOG }}
          OCI_SUBNET_OCID_VAP: ${{ secrets.OCI_SUBNET_OCID_VAP }}
          OCI_AVAILABILITY_DOMAIN_VAP: ${{ secrets.OCI_AVAILABILITY_DOMAIN_VAP }}
          ALICLOUD_ACCESS_KEY: ${{ secrets.ALICLOUD_ACCESS_KEY }}
          ALICLOUD_SECRET_KEY: ${{ secrets.ALICLOUD_SECRET_KEY }}
          ALICLOUD_SSH_PASSWORD: ${{ secrets.ALICLOUD_SSH_PASSWORD }}
        run: |
          packer build \
            -var "lantern_box_version=$VERSION" \
            -only="$ONLY" \
            .

      - name: Clean up OCI key
        if: always() && matrix.builder == 'oracle-oci'
        run: rm -f /tmp/oci_api_key.pem

      - name: Upload manifest
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: packer-manifest-${{ matrix.builder }}
          path: deploy/packer/manifest.json
