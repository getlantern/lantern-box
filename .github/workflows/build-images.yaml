name: Build Packer Images

on:
  # Run after a release is published
  release:
    types: [published]

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      version:
        description: "lantern-box version to bake into the image (e.g. 1.2.3)"
        required: true
        type: string
      builders:
        description: "Comma-separated builders (digitalocean,linode,oracle-oci,alicloud-ecs)"
        required: false
        default: "digitalocean,linode,oracle-oci,alicloud-ecs"
        type: string

permissions:
  contents: read

jobs:
  # Determine version and which builders to run
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Determine version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            if [[ "$INPUT_VERSION" == v* ]]; then
              echo "::error::Version should not start with 'v' (got '$INPUT_VERSION'). Use e.g. 1.2.3"
              exit 1
            fi
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Build matrix
        id: matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_BUILDERS: ${{ inputs.builders }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            builders="digitalocean,linode,oracle-oci,alicloud-ecs"
          else
            builders="$INPUT_BUILDERS"
          fi
          # Validate that we have at least one builder
          if [ -z "$builders" ]; then
            echo "::error::No builders specified. Provide at least one builder (comma-separated) via the 'builders' input."
            exit 1
          fi

          # Convert to JSON array for matrix strategy using jq to safely escape values
          # -c produces compact single-line output required by $GITHUB_OUTPUT
          json_array=$(printf '%s\n' "$builders" | tr ',' '\n' | jq -R . | jq -sc .)
          echo "matrix={\"builder\":$json_array}" >> "$GITHUB_OUTPUT"
          echo "Matrix: $json_array"

  # Prune old images before building (avoids provider quota limits)
  prune:
    name: Prune old images
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: prepare
    steps:
      - name: Prune old DigitalOcean snapshots
        if: contains(needs.prepare.outputs.matrix, 'digitalocean')
        env:
          DIGITALOCEAN_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
        run: |
          KEEP=3
          echo "Fetching DigitalOcean snapshots..."
          snapshots=$(curl -sS -f -H "Authorization: Bearer $DIGITALOCEAN_API_TOKEN" \
            "https://api.digitalocean.com/v2/snapshots?resource_type=droplet&per_page=200" \
            | jq -r '.snapshots[] | select(.name | startswith("lantern-box-")) | "\(.created_at)\t\(.id)\t\(.name)"' \
            | sort -r)
          total=$(echo "$snapshots" | grep -c . || true)
          echo "Found $total lantern-box snapshots (keeping $KEEP most recent)"
          if [ "$total" -le "$KEEP" ]; then
            echo "Nothing to prune."
          else
            failures=0
            echo "$snapshots" | tail -n +$((KEEP + 1)) | while IFS=$'\t' read -r created id name; do
              echo "Deleting $name ($id, created $created)..."
              http_code=$(curl -sS -o /dev/null -w '%{http_code}' -X DELETE -H "Authorization: Bearer $DIGITALOCEAN_API_TOKEN" \
                "https://api.digitalocean.com/v2/snapshots/$id")
              if [ "$http_code" = "404" ]; then
                echo "  Already gone (404), skipping."
              elif [ "$http_code" -ge 400 ]; then
                echo "::error::Failed to delete DO snapshot $name ($id): HTTP $http_code"
                failures=$((failures + 1))
              fi
            done
            if [ "$failures" -gt 0 ]; then
              echo "::error::$failures snapshot(s) failed to delete"
              exit 1
            fi
          fi

      - name: Prune old Linode images
        if: contains(needs.prepare.outputs.matrix, 'linode')
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
        run: |
          KEEP=3
          echo "Fetching Linode custom images..."
          images=$(curl -sS -f -H "Authorization: Bearer $LINODE_TOKEN" \
            "https://api.linode.com/v4/images?page_size=500" \
            | jq -r '.data[] | select(.is_public == false and (.label | startswith("lantern-box-"))) | "\(.created)\t\(.id)\t\(.label)"' \
            | sort -r)
          total=$(echo "$images" | grep -c . || true)
          echo "Found $total lantern-box images (keeping $KEEP most recent)"
          if [ "$total" -le "$KEEP" ]; then
            echo "Nothing to prune."
          else
            failures=0
            echo "$images" | tail -n +$((KEEP + 1)) | while IFS=$'\t' read -r created id label; do
              echo "Deleting $label ($id, created $created)..."
              http_code=$(curl -sS -o /dev/null -w '%{http_code}' -X DELETE -H "Authorization: Bearer $LINODE_TOKEN" \
                "https://api.linode.com/v4/images/$id")
              if [ "$http_code" = "404" ]; then
                echo "  Already gone (404), skipping."
              elif [ "$http_code" -ge 400 ]; then
                echo "::error::Failed to delete Linode image $label ($id): HTTP $http_code"
                failures=$((failures + 1))
              fi
            done
            if [ "$failures" -gt 0 ]; then
              echo "::error::$failures image(s) failed to delete"
              exit 1
            fi
          fi

  # Build each provider in parallel
  build:
    name: Build ${{ matrix.builder }}
    runs-on: ubuntu-latest
    needs: [prepare, prune]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    # Alicloud copies images to 8 regions (up to 2h). Others are fast.
    timeout-minutes: ${{ matrix.builder == 'alicloud-ecs' && 150 || 45 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Packer
        uses: hashicorp/setup-packer@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          version: 1.11.2

      - name: Init Packer plugins
        working-directory: deploy/packer
        run: packer init lantern-box.pkr.hcl

      - name: Map builder to packer -only flag
        id: only
        env:
          BUILDER: ${{ matrix.builder }}
        run: |
          case "$BUILDER" in
            oracle-oci)
              echo "flag=oracle-oci.lantern-box-iad,oracle-oci.lantern-box-fra,oracle-oci.lantern-box-nrt,oracle-oci.lantern-box-sin" >> "$GITHUB_OUTPUT"
              ;;
            digitalocean|linode|alicloud-ecs)
              echo "flag=${BUILDER}.lantern-box" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unsupported builder: $BUILDER"
              exit 1
              ;;
          esac

      - name: Write OCI private key
        if: matrix.builder == 'oracle-oci'
        run: |
          echo "${{ secrets.OCI_KEY_CONTENT }}" > /tmp/oci_api_key.pem
          chmod 600 /tmp/oci_api_key.pem

      - name: Build
        working-directory: deploy/packer
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          ONLY: ${{ steps.only.outputs.flag }}
          DIGITALOCEAN_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_KEY_FILE: /tmp/oci_api_key.pem
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          OCI_SUBNET_OCID_IAD: ${{ secrets.OCI_SUBNET_OCID_IAD || secrets.OCI_SUBNET_OCID }}
          OCI_AVAILABILITY_DOMAIN_IAD: ${{ secrets.OCI_AVAILABILITY_DOMAIN_IAD || secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_SUBNET_OCID_FRA: ${{ secrets.OCI_SUBNET_OCID_FRA }}
          OCI_AVAILABILITY_DOMAIN_FRA: ${{ secrets.OCI_AVAILABILITY_DOMAIN_FRA }}
          OCI_SUBNET_OCID_NRT: ${{ secrets.OCI_SUBNET_OCID_NRT }}
          OCI_AVAILABILITY_DOMAIN_NRT: ${{ secrets.OCI_AVAILABILITY_DOMAIN_NRT }}
          OCI_SUBNET_OCID_SIN: ${{ secrets.OCI_SUBNET_OCID_SIN }}
          OCI_AVAILABILITY_DOMAIN_SIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN_SIN }}
          ALICLOUD_ACCESS_KEY: ${{ secrets.ALICLOUD_ACCESS_KEY }}
          ALICLOUD_SECRET_KEY: ${{ secrets.ALICLOUD_SECRET_KEY }}
          ALICLOUD_SSH_PASSWORD: ${{ secrets.ALICLOUD_SSH_PASSWORD }}
        run: |
          packer build \
            -var "lantern_box_version=$VERSION" \
            -only="$ONLY" \
            lantern-box.pkr.hcl

      - name: Clean up OCI key
        if: always() && matrix.builder == 'oracle-oci'
        run: rm -f /tmp/oci_api_key.pem

      - name: Upload manifest
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: packer-manifest-${{ matrix.builder }}
          path: deploy/packer/manifest.json
