name: Auto-tag patch release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    # Skip if the push was a tag-created commit (avoid loops)
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump patch version and tag
        id: tag
        run: |
          # Get the latest semver tag
          latest=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$latest" ]; then
            next="v0.0.1"
          else
            # Strip 'v' prefix, split into parts, bump patch
            version="${latest#v}"
            major=$(echo "$version" | cut -d. -f1)
            minor=$(echo "$version" | cut -d. -f2)
            patch=$(echo "$version" | cut -d. -f3)
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "Bumping $latest → $next"

      - name: Create and push tag
        run: |
          git tag "${{ steps.tag.outputs.next }}"
          git push origin "${{ steps.tag.outputs.next }}"
