on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: "write"
  actions: write

jobs:
  release:
    runs-on:
      group: large-runners
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Mandatory to use the extract version from tag
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: Install arm64 cross-compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: getlantern
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser-pro
          version: "~> 2"
          args: release --clean --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          FURY_TOKEN: ${{ secrets.FURY_TOKEN }}

      - name: Trigger Packer image builds
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Strip 'v' prefix for the version input
          version="${GITHUB_REF_NAME#v}"
          gh workflow run build-images.yaml -f "version=$version"
